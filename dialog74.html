<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog-Training: Russisch A1</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --white: #ffffff;
            --border: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; color: var(--primary); }

        .intro {
            background: #eef2f3;
            padding: 15px;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .dialog-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .dialog-line {
            margin-bottom: 10px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .person-a { color: var(--secondary); font-weight: bold; margin-right: 10px; }
        .person-b { color: #e67e22; font-weight: bold; margin-right: 10px; }

        select {
            padding: 6px 10px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            outline: none;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        select.correct {
            border-color: var(--success);
            background-color: #eafaf1;
            color: var(--success);
        }

        select.incorrect {
            border-color: var(--error);
            background-color: #fdedec;
            color: var(--error);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-solve { background-color: #f39c12; color: white; }
        button:hover { opacity: 0.8; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .dialog-line { font-size: 1rem; }
            .controls { flex-direction: column; }
            select { width: 100%; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dialog-Vervollständigung</h1>
    
    <div class="intro">
        Vervollständigen Sie die Mini-Dialoge. Achten Sie auf das Fragewort (Где? О чём? Во что?), um den richtigen Fall zu wählen.
        <br>Feedback erfolgt <strong>sofort</strong>: 🟢 Grün = Richtig | 🔴 Rot = Falsch.
    </div>

    <div id="dialog-container">
        <!-- JS generiert hier die Aufgaben -->
    </div>
</div>

<script>
    const dialogues = [
        {
            a: "Где ты живёшь?",
            b: "Я живу ...",
            options: ["в Москве", "в Москву", "о Москве"],
            ans: "в Москве"
        },
        {
            a: "Во что вы играете?",
            b: "Мы играем ...",
            options: ["в футбол", "на футболе", "в футболе"],
            ans: "в футбол"
        },
        {
            a: "На чём ты играешь?",
            b: "Я играю ...",
            options: ["в гитаре", "на гитаре", "на гитару"],
            ans: "на гитаре"
        },
        {
            a: "О чём ты мечтаешь?",
            b: "Я мечтаю ...",
            options: ["в собаке", "о собаку", "о собаке"],
            ans: "о собаке"
        },
        {
            a: "Где ты учишься?",
            b: "Я учусь ...",
            options: ["в школе", "в школу", "на школу"],
            ans: "в школе"
        },
        {
            a: "О ком ты думаешь?",
            b: "Я думаю ...",
            options: ["о маме", "в маму", "на маме"],
            ans: "о маме"
        },
        {
            a: "Где находится университет?",
            b: "Он находится ...",
            options: ["в центр", "в центре", "на центр"],
            ans: "в центре"
        },
        {
            a: "Кого ты спрашиваешь?",
            b: "Я спрашиваю ...",
            options: ["учителя", "об учителе", "на учителе"],
            ans: "учителя"
        },
        {
            a: "Что ты вспоминаешь?",
            b: "Я вспоминаю ...",
            options: ["о лете", "лето", "в лете"],
            ans: "лето"
        },
        {
            a: "Почему ты не ешь мясо?",
            b: "Я сижу ...",
            options: ["в диете", "на диете", "на диету"],
            ans: "на diete" // normalized below
        },
        {
            a: "На чём ты сидишь?",
            b: "Я сижу ...",
            options: ["на диване", "в диване", "на диван"],
            ans: "на диване"
        },
        {
            a: "Где лежит твоя книга?",
            b: "Она лежит ...",
            options: ["на полку", "в полке", "на полке"],
            ans: "на полке"
        },
        {
            a: "О ком ты вспоминаешь?",
            b: "Я вспоминаю ...",
            options: ["подругу", "о подруге", "на подруге"],
            ans: "о подруге"
        },
        {
            a: "Где работает твой папа?",
            b: "Он работает ...",
            options: ["в офисе", "на офисе", "в офис"],
            ans: "в офисе"
        },
        {
            a: "О чём ты спрашиваешь Иру?",
            b: "Я спрашиваю её ...",
            options: ["о книге", "книгу", "в книге"],
            ans: "о книге"
        }
    ];

    // Typo fix for comparison
    dialogues[9].ans = "на диете";

    const container = document.getElementById('dialog-container');

    dialogues.forEach((d, idx) => {
        const card = document.createElement('div');
        card.className = 'dialog-card';
        card.id = `card-${idx}`;

        card.innerHTML = `
            <div class="dialog-line"><span class="person-a">A:</span> „${d.a}“</div>
            <div class="dialog-line">
                <span class="person-b">B:</span> „${d.b.replace('...', '')} 
                <select onchange="validate(this, '${d.ans}')" id="sel-${idx}">
                    <option value="">-- wählen --</option>
                    ${d.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                </select>.“
            </div>
            <div class="controls">
                <button class="btn-reset" onclick="resetTask(${idx})">Zurücksetzen</button>
                <button class="btn-solve" onclick="solveTask(${idx}, '${d.ans}')">Lösung anzeigen</button>
            </div>
        `;
        container.appendChild(card);
    });

    function validate(el, ans) {
        if (el.value === "") {
            el.className = "";
        } else if (el.value === ans) {
            el.className = "correct";
        } else {
            el.className = "incorrect";
        }
    }

    window.resetTask = function(idx) {
        const el = document.getElementById(`sel-${idx}`);
        el.value = "";
        el.className = "";
    };

    window.solveTask = function(idx, ans) {
        const el = document.getElementById(`sel-${idx}`);
        el.value = ans;
        el.className = "correct";
    };
</script>

</body>
</html>
