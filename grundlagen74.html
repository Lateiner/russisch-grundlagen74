<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russische Grammatik: Verben, Präpositiv & Akkusativ</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1, h2 {
            text-align: center;
            color: var(--primary);
        }

        .intro {
            background: #eef2f7;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 6px solid var(--secondary);
        }

        .exercise-card {
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            transition: transform 0.2s;
        }

        .exercise-header {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: block;
            color: var(--secondary);
        }

        .sentence {
            font-size: 1.2em;
            margin-bottom: 15px;
            line-height: 2;
        }

        select {
            padding: 8px 12px;
            font-size: 1em;
            border-radius: 5px;
            border: 2px solid #ccc;
            outline: none;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        select.correct {
            border-color: var(--success);
            background-color: #e8f5e9;
            color: var(--success);
        }

        select.incorrect {
            border-color: var(--error);
            background-color: #ffebee;
            color: var(--error);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: opacity 0.2s;
        }

        .btn-reset { background: #95a5a6; color: white; }
        .btn-solve { background: #f39c12; color: white; }
        button:hover { opacity: 0.8; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russische Grammatik</h1>
    <h2>Verben mit Präpositiv und Akkusativ</h2>

    <div class="intro">
        <p>In dieser Lektion lernen wir Verben, die den <strong>Präpositiv</strong> (Ort, Thema) oder den <strong>Akkusativ</strong> (Sportart, direktes Objekt) verlangen.</p>
        <p>Beispiele:<br>
        „Я живу в Москве.“ (Präpositiv - Ort)<br>
        „Я играю в футбол.“ (Akkusativ - Sport)</p>
    </div>

    <div id="exercise-list">
        <!-- JS generiert hier die Aufgaben -->
    </div>
</div>

<script>
    const exercises = [
        { q: "Я живу ... Берлине.", options: ["в", "на", "о"], ans: "в" },
        { q: "Мы думаем ... отпуске.", options: ["в", "на", "о"], ans: "о" },
        { q: "Анна играет ... гитаре.", options: ["в", "на", "о"], ans: "на" },
        { q: "Иван играет ... футбол.", options: ["в", "на", "о"], ans: "в" },
        { q: "Книга лежит ... столе.", options: ["в", "на", "о"], ans: "на" },
        { q: "Я мечтаю ... собаке.", options: ["в", "на", "о"], ans: "о" },
        { q: "Москва находится ... России.", options: ["в", "на", "о"], ans: "в" },
        { q: "Папа работает ... офисе.", options: ["в", "на", "о"], ans: "в" },
        { q: "Студент учится ... университете.", options: ["в", "на", "о"], ans: "в" },
        { q: "Мама сидит ... диване.", options: ["в", "на", "о"], ans: "на" },
        { q: "Я вспоминаю ... лете.", options: ["в", "на", "о"], ans: "о" },
        { q: "Мы играем ... теннис.", options: ["в", "на", "о"], ans: "в" },
        { q: "Он спрашивает ... работе.", options: ["в", "на", "о"], ans: "о" },
        { q: "Бабушка живёт ... деревне.", options: ["в", "на", "о"], ans: "в" },
        { q: "Ты сидишь ... диете?", options: ["в", "на", "о"], ans: "на" },
        { q: "Дети играют ... пианино.", options: ["в", "на", "о"], ans: "на" },
        { q: "Телефон лежит ... сумке.", options: ["в", "на", "о"], ans: "в" },
        { q: "Я думаю ... маме.", options: ["в", "на", "о"], ans: "о" },
        { q: "Брат работает ... заводе.", options: ["в", "на", "о"], ans: "на" },
        { q: "Они учатся ... школе.", options: ["в", "на", "о"], ans: "в" }
    ];

    const list = document.getElementById('exercise-list');

    exercises.forEach((ex, index) => {
        const card = document.createElement('div');
        card.className = 'exercise-card';
        card.id = `card-${index}`;

        const parts = ex.q.split('...');
        
        card.innerHTML = `
            <span class="exercise-header">Aufgabe ${index + 1}</span>
            <div class="sentence">
                ${parts[0]}
                <select onchange="validate(this, '${ex.ans}')" id="sel-${index}">
                    <option value="">--?--</option>
                    ${ex.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                </select>
                ${parts[1]}
            </div>
            <div class="controls">
                <button class="btn-reset" onclick="reset(${index})">Zurücksetzen</button>
                <button class="btn-solve" onclick="solve(${index}, '${ex.ans}')">Lösung anzeigen</button>
            </div>
        `;
        list.appendChild(card);
    });

    function validate(element, answer) {
        if (element.value === "") {
            element.className = "";
        } else if (element.value === answer) {
            element.className = "correct";
        } else {
            element.className = "incorrect";
        }
    }

    function reset(index) {
        const sel = document.getElementById(`sel-${index}`);
        sel.value = "";
        sel.className = "";
    }

    function solve(index, answer) {
        const sel = document.getElementById(`sel-${index}`);
        sel.value = answer;
        sel.className = "correct";
    }
</script>

</body>
</html>
