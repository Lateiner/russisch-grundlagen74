<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bild-Wort-Matching (15 Aufgaben): Russisch A1</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --white: #ffffff;
            --border: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; color: var(--primary); }

        .intro {
            background: #eef2f3;
            padding: 15px;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .quiz-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .quiz-card:hover { transform: translateY(-5px); }

        .image-placeholder {
            font-size: 4rem;
            margin-bottom: 15px;
            user-select: none;
        }

        .options-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-btn {
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: left;
            transition: all 0.2s;
            outline: none;
        }

        .option-btn:hover { background-color: #f8f9fa; border-color: var(--secondary); }

        .option-btn.correct {
            background-color: #eafaf1 !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            font-weight: bold;
        }

        .option-btn.incorrect {
            background-color: #fdedec !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        .card-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-reset { background: #95a5a6; color: white; }
        .btn-solve { background: #f39c12; color: white; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .quiz-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bild-Wort-Matching</h1>
    
    <div class="intro">
        Betrachten Sie das Bild und wählen Sie die grammatikalisch richtige Phrase aus. 
        Das Feedback erfolgt <strong>sofort</strong>: <br>
        🟢 <strong>Grün</strong> = Richtig | 🔴 <strong>Rot</strong> = Falsch
    </div>

    <div class="quiz-grid" id="quiz-container">
        <!-- JS generiert hier die Karten -->
    </div>
</div>

<script>
    const quizData = [
        { img: "🎸", options: ["играть в гитару", "играть на гитаре", "играть о гитаре"], ans: 1 },
        { img: "⚽", options: ["играть в футбол", "играть на футболе", "играть о футболе"], ans: 0 },
        { img: "🏢", options: ["работать на офисе", "работать в офисе", "работать о офисе"], ans: 1 },
        { img: "🛋️", options: ["лежать на диване", "лежать в диване", "лежать о диване"], ans: 0 },
        { img: "🐕", options: ["мечтать о собаку", "мечтать в собаке", "мечтать о собаке"], ans: 2 },
        { img: "🏫", options: ["учиться на школе", "учиться в школе", "учиться о школе"], ans: 1 },
        { img: "🥗", options: ["сидеть на диете", "сидеть в диете", "сидеть о диете"], ans: 0 },
        { img: "🎹", options: ["играть в пианино", "играть на пианино", "играть о пианино"], ans: 1 },
        { img: "📖", options: ["вспоминать о книге", "вспоминать в книге", "вспоминать на книге"], ans: 0 },
        { img: "🇷🇺", options: ["находиться на России", "находиться в России", "находиться о России"], ans: 1 },
        { img: "🌍", options: ["думать о путешествии", "думать в путешествие", "думать на путешествии"], ans: 0 },
        { img: "👩‍🦰", options: ["вспоминать о подругу", "вспоминать на подруге", "вспоминать подругу"], ans: 2 },
        { img: "🎾", options: ["играть в теннис", "играть на теннисе", "играть о теннисе"], ans: 0 },
        { img: "🗄️", options: ["лежать в полку", "лежать на полке", "лежать на полку"], ans: 1 },
        { img: "🏛️", options: ["находиться в университете", "находиться на университете", "находиться в университет"], ans: 0 }
    ];

    const container = document.getElementById('quiz-container');

    function renderQuiz() {
        container.innerHTML = '';
        quizData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.id = `card-${idx}`;

            let optionsHtml = item.options.map((opt, optIdx) => `
                <button class="option-btn" 
                        onclick="checkChoice(${idx}, ${optIdx}, ${item.ans})" 
                        id="btn-${idx}-${optIdx}">
                    ${opt}
                </button>
            `).join('');

            card.innerHTML = `
                <div class="image-placeholder">${item.img}</div>
                <div class="options-container">${optionsHtml}</div>
                <div class="card-controls">
                    <button class="btn-small btn-reset" onclick="resetCard(${idx})">Zurücksetzen</button>
                    <button class="btn-small btn-solve" onclick="solveCard(${idx}, ${item.ans})">Lösung</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.checkChoice = function(cardIdx, choiceIdx, correctIdx) {
        const buttons = document.querySelectorAll(`#card-${cardIdx} .option-btn`);
        buttons.forEach(btn => btn.classList.add('disabled'));

        const selectedBtn = document.getElementById(`btn-${cardIdx}-${choiceIdx}`);
        const correctBtn = document.getElementById(`btn-${cardIdx}-${correctIdx}`);

        if (choiceIdx === correctIdx) {
            selectedBtn.classList.add('correct');
        } else {
            selectedBtn.classList.add('incorrect');
            correctBtn.classList.add('correct');
        }
    };

    window.resetCard = function(cardIdx) {
        const buttons = document.querySelectorAll(`#card-${cardIdx} .option-btn`);
        buttons.forEach(btn => {
            btn.classList.remove('correct', 'incorrect', 'disabled');
        });
    };

    window.solveCard = function(cardIdx, correctIdx) {
        const buttons = document.querySelectorAll(`#card-${cardIdx} .option-btn`);
        buttons.forEach(btn => btn.classList.add('disabled'));
        const correctBtn = document.getElementById(`btn-${cardIdx}-${correctIdx}`);
        correctBtn.classList.add('correct');
    };

    renderQuiz();
</script>

</body>
</html>
