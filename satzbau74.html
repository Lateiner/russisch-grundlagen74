<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satzbau-Assistent: Fokus Präpositionen</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --white: #ffffff;
            --border: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; }

        .intro {
            background: #eef2f3;
            padding: 15px;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .exercise-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .task-title {
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 15px;
            display: block;
        }

        /* Bereich für den im Bau befindlichen Satz */
        .sentence-display {
            min-height: 70px;
            border: 1px solid #eee;
            background: #fcfcfc;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            align-items: center;
            border-radius: 8px;
        }

        /* Kacheln */
        .word-tile {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            font-size: 1.1rem;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .word-tile.correct { background-color: var(--success); cursor: default; }
        .word-tile.incorrect { background-color: var(--error); }
        .word-tile.disabled { opacity: 0.2; cursor: default; pointer-events: none; }

        /* Dropdown Styling */
        .prep-dropdown {
            padding: 8px;
            font-size: 1.1rem;
            border: 2px solid var(--secondary);
            border-radius: 6px;
            background: white;
            cursor: pointer;
            outline: none;
        }

        .prep-dropdown.correct { border-color: var(--success); color: var(--success); background: #eafaf1; }
        .prep-dropdown.incorrect { border-color: var(--error); color: var(--error); background: #fdedec; }

        /* Wort-Pool */
        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: #f0f2f5;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-reset { background: #95a5a6; color: white; }
        .btn-solve { background: #f39c12; color: white; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .sentence-display { min-height: 100px; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Satzbau-Assistent</h1>
    
    <div class="intro">
        Bauen Sie den Satz, indem Sie die Wörter anklicken. Wenn eine <b>Präposition</b> benötigt wird, wählen Sie diese aus dem Dropdown-Menü aus.
        <br>Feedback erfolgt <strong>sofort</strong> (Grün = Richtig, Rot = Falsch).
    </div>

    <div id="exercise-list">
        <!-- JS generiert hier die Aufgaben -->
    </div>
</div>

<script>
    const exercises = [
        { id: 0, german: "Ich lebe in Moskau.", russian: ["Я", "живу", "в", "Москве"], prepIdx: 2, options: ["в", "на", "о"] },
        { id: 1, german: "Wir denken an eine Reise.", russian: ["Мы", "думаем", "о", "путешествии"], prepIdx: 2, options: ["в", "о", "на"] },
        { id: 2, german: "Anna spielt Gitarre.", russian: ["Анна", "играет", "на", "гитаре"], prepIdx: 2, options: ["в", "на", "о"] },
        { id: 3, german: "Ivan spielt Fußball.", russian: ["Иван", "играет", "в", "футбол"], prepIdx: 2, options: ["в", "на", "об"] },
        { id: 4, german: "Das Buch liegt im Regal.", russian: ["Книга", "лежит", "на", "полке"], prepIdx: 2, options: ["в", "на", "о"] },
        { id: 5, german: "Ich träume von einem Hund.", russian: ["Я", "мечтаю", "о", "собаке"], prepIdx: 2, options: ["об", "о", "в"] },
        { id: 6, german: "Die MGU befindet sich in Moskau.", russian: ["МГУ", "находится", "в", "Москве"], prepIdx: 2, options: ["в", "на", "о"] },
        { id: 7, german: "Mama ist auf Diät.", russian: ["Мама", "сидит", "на", "диете"], prepIdx: 2, options: ["в", "на", "о"] },
        { id: 8, german: "Der Student lernt am Institut.", russian: ["Студент", "учится", "в", "институте"], prepIdx: 2, options: ["на", "о", "в"] },
        { id: 9, german: "Papa arbeitet im Büro.", russian: ["Папа", "работает", "в", "офисе"], prepIdx: 2, options: ["на", "в", "о"] }
    ];

    // Status-Tracking
    let appState = exercises.map(ex => ({
        currentIndex: 0,
        shuffledPool: ex.russian.filter((_, i) => i !== ex.prepIdx).sort(() => Math.random() - 0.5),
        selectedPrep: "",
        isResolved: false
    }));

    function render() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = '';

        exercises.forEach((ex, exIdx) => {
            const state = appState[exIdx];
            const card = document.createElement('div');
            card.className = 'exercise-card';

            // Satz-Display bauen
            let displayHtml = '';
            for (let i = 0; i < state.currentIndex; i++) {
                if (i === ex.prepIdx) {
                    displayHtml += `<select class="prep-dropdown correct" disabled><option>${ex.russian[i]}</option></select>`;
                } else {
                    displayHtml += `<div class="word-tile correct">${ex.russian[i]}</div>`;
                }
            }

            // Wenn der nächste Schritt die Präposition ist
            if (state.currentIndex === ex.prepIdx && !state.isResolved) {
                displayHtml += `
                    <select class="prep-dropdown" onchange="handlePrepChange(${exIdx}, this)">
                        <option value="">--?--</option>
                        ${ex.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                    </select>
                `;
            }

            // Pool-Logik (nur Wörter anzeigen, die noch nicht im Resultat sind und keine Präposition sind)
            const wordsInResult = ex.russian.slice(0, state.currentIndex).filter((_, i) => i !== ex.prepIdx);
            
            let poolHtml = state.shuffledPool.map(word => {
                const usedCount = wordsInResult.filter(w => w === word).length;
                const totalCount = state.shuffledPool.filter(w => w === word).length;
                const isDisabled = usedCount >= totalCount || (state.currentIndex === ex.prepIdx && !state.isResolved);
                
                return `<div class="word-tile ${isDisabled ? 'disabled' : ''}" onclick="handleWordClick(${exIdx}, '${word}')">${word}</div>`;
            }).join('');

            card.innerHTML = `
                <span class="task-title">Aufgabe ${exIdx + 1}: „${ex.german}“</span>
                <div class="sentence-display">${displayHtml}</div>
                <div class="word-pool">${poolHtml}</div>
                <div class="controls">
                    <button class="btn-reset" onclick="resetTask(${exIdx})">Zurücksetzen</button>
                    <button class="btn-solve" onclick="solveTask(${exIdx})">Lösung anzeigen</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    window.handleWordClick = function(exIdx, word) {
        const ex = exercises[exIdx];
        const state = appState[exIdx];
        
        // Verhindern, dass Wörter geklickt werden, wenn die Präposition dran ist
        if (state.currentIndex === ex.prepIdx) return;

        if (word === ex.russian[state.currentIndex]) {
            state.currentIndex++;
            render();
        } else {
            // Visuelles Feedback für Fehler
            const card = document.querySelectorAll('.exercise-card')[exIdx];
            const tiles = card.querySelectorAll('.word-pool .word-tile');
            tiles.forEach(t => {
                if (t.innerText === word) {
                    t.classList.add('incorrect');
                    setTimeout(() => t.classList.remove('incorrect'), 500);
                }
            });
        }
    };

    window.handlePrepChange = function(exIdx, selectEl) {
        const ex = exercises[exIdx];
        const state = appState[exIdx];
        
        if (selectEl.value === ex.russian[ex.prepIdx]) {
            selectEl.className = "prep-dropdown correct";
            state.currentIndex++;
            render();
        } else if (selectEl.value !== "") {
            selectEl.className = "prep-dropdown incorrect";
            setTimeout(() => {
                selectEl.className = "prep-dropdown";
                selectEl.value = "";
            }, 800);
        }
    };

    window.resetTask = function(exIdx) {
        appState[exIdx].currentIndex = 0;
        appState[exIdx].isResolved = false;
        appState[exIdx].shuffledPool = exercises[exIdx].russian
            .filter((_, i) => i !== exercises[exIdx].prepIdx)
            .sort(() => Math.random() - 0.5);
        render();
    };

    window.solveTask = function(exIdx) {
        appState[exIdx].currentIndex = exercises[exIdx].russian.length;
        render();
    };

    // Initialer Start
    render();
</script>

</body>
</html>
